# Bitcoin Core Configuration
# This file uses environment variables for sensitive data
# Set via GitHub Secrets or deployment environment

# Network
network=mainnet
testnet=0
regtest=0

# Server
server=1
daemon=1
pidfile=/var/run/bitcoin/bitcoind.pid

# RPC Configuration
rpc=1
rpcbind=127.0.0.1
rpcport=8332
rpcuser=${RPC_USER}
rpcpassword=${RPC_PASSWORD}
rpcallowip=127.0.0.1
rpcallowip=::1

# Data directory
datadir=/var/lib/bitcoin

# Wallet
wallet=default_wallet
walletdir=/var/lib/bitcoin/wallets

# P2P Network
port=8333
connect=
addnode=
maxconnections=125

# Blockchain
prune=0

# Logging
logtimestamps=1
logips=1

# Debug (set to 0 for production)
debug=0
# debug=net
# debug=wallets
# debug=rpc

# Fallback fee (satoshis per byte)
fallbackfee=0.0001

# Min relay tx fee
minrelaytxfee=0.00001

# Performance
dbcache=450
maxmempool=300

# Notifications (optional)
# walletnotify=curl -X POST http://localhost:8080/wallet-notify?txid=%s
# blocknotify=curl -X POST http://localhost:8080/block-notify?hash=%s
